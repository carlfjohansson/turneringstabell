<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Turneringstabeller</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
<style>
:root {
  --red:#C8102E; --red-dark:#8B0000; --yellow:#FFD700;
  --dark:#1C1C1C; --surf:#2A2A2A; --surf2:#333;
  --text:#F0F0F0; --muted:#AAA;
  --win-bg:#1B4D1B; --win-tx:#A8E6A3;
  --loss-bg:#4D1B1B; --loss-tx:#FFAAAA;
  --draw-bg:#4D3B00; --draw-tx:#FFD700;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:"Segoe UI",Arial,sans-serif;min-height:100vh}

/* ── Sökvy ── */
.search-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surf);border:1px solid #3a3a3a;border-radius:14px;padding:44px 40px;max-width:480px;width:100%}
.card h1{color:var(--yellow);font-size:1.5rem;margin-bottom:6px}
.card .sub{color:var(--muted);font-size:.88rem;margin-bottom:28px;line-height:1.5}
.search-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.search-row{display:flex;gap:10px}
.search-row input{
  flex:1;padding:11px 14px;background:#1C1C1C;border:1px solid #555;
  border-radius:7px;color:var(--text);font-size:1rem;outline:none
}
.search-row input:focus{border-color:var(--yellow)}
.search-row button{
  padding:11px 20px;background:var(--red);color:#fff;border:none;
  border-radius:7px;font-size:.95rem;cursor:pointer;font-weight:700;white-space:nowrap
}
.search-row button:hover{background:#a00d24}
.results{margin-top:20px;display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto}
.results-count{font-size:.76rem;color:var(--muted);margin-bottom:4px;padding:0 2px}
.result-item{
  padding:12px 16px;background:#1C1C1C;border:1px solid #3a3a3a;border-radius:8px;
  cursor:pointer;transition:border-color .15s
}
.result-item:hover{border-color:var(--yellow)}
.result-name{font-weight:600;font-size:.95rem}
.result-name mark{background:transparent;color:var(--yellow);font-weight:700}
.result-meta{font-size:.76rem;color:var(--muted);margin-top:3px}
.msg{color:var(--muted);font-size:.85rem;padding:12px 0;text-align:center}
.error-msg{color:#FF8888;font-size:.85rem;padding:12px;background:rgba(200,16,46,.1);border-radius:6px;margin-top:12px}

/* ── Turneringsvy ── */
#view-tourn{display:none;padding:20px 24px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:12px;flex-wrap:wrap;
  background:var(--surf);border:1px solid #3a3a3a;border-radius:10px;
  padding:10px 16px;
}
.topbar h1{color:var(--yellow);font-size:1.15rem;font-weight:700;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-btns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.vbtn{
  background:var(--surf2);color:var(--muted);border:1px solid #555;
  border-radius:6px;padding:6px 12px;font-size:.82rem;cursor:pointer;
  transition:all .15s;font-family:inherit;white-space:nowrap
}
.vbtn:hover{border-color:var(--yellow);color:var(--text)}
.vbtn.active{background:var(--red);color:#fff;border-color:var(--red);font-weight:600}
.vbtn.copied{background:#1B4D1B;color:var(--win-tx);border-color:#1B4D1B}
.exportbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ebtn{
  padding:5px 12px;background:transparent;color:var(--muted);border:1px solid #444;
  border-radius:6px;font-size:.78rem;cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap
}
.ebtn:hover{border-color:var(--yellow);color:var(--text)}
.wrap{overflow-x:auto;border-radius:10px;border:1px solid #3a3a3a;-webkit-overflow-scrolling:touch}

/* ── Tabeller ── */
table{border-collapse:collapse;font-size:.86rem;width:1px}
thead th{
  background:var(--red);color:#fff;font-weight:600;
  padding:5px 4px;font-size:.76rem;white-space:nowrap;
  position:sticky;top:0;z-index:2
}
thead th.th-name{text-align:left;background:var(--red-dark);position:sticky;left:0;z-index:3}
thead th.th-num{width:28px;min-width:28px;padding:5px 2px}
thead th.th-cell{width:30px;min-width:30px;padding:5px 2px}
thead th.th-stat{width:1px;white-space:nowrap;padding:5px 10px}
thead th.th-pr{width:1px;white-space:nowrap;padding:5px 10px;cursor:help;
  border-bottom:1px dashed rgba(255,255,255,.4)}
tbody tr:nth-child(odd) td{background:var(--surf)}
tbody tr:nth-child(even) td{background:var(--surf2)}
tbody tr:hover td{filter:brightness(1.1)}
td.td-rank{text-align:center;font-weight:700;color:var(--muted);padding:5px 4px;
  font-size:.83rem;width:24px;border-right:1px solid #3a3a3a}
td.td-name{text-align:left;padding:4px 8px 4px 5px;white-space:nowrap;width:1%;
  position:sticky;left:0;z-index:1;border-right:1px solid #3a3a3a}
tbody tr:nth-child(odd) td.td-name{background:var(--surf)}
tbody tr:nth-child(even) td.td-name{background:var(--surf2)}
.td-pname{font-weight:500;display:block;line-height:1.25;font-size:.86rem}
.td-sub{font-size:.70rem;color:var(--muted);display:block;line-height:1.15}
td.td-cell{text-align:center;padding:5px 10px;color:var(--muted);font-size:.82rem;white-space:nowrap;width:1px}
td.td-w{color:var(--win-tx)}
td.td-d{color:var(--draw-tx)}
td.td-l{color:var(--loss-tx)}
td.td-score{text-align:center;font-weight:700;color:var(--yellow);padding:5px 10px;
  font-size:.88rem;border-left:1px solid #3a3a3a;white-space:nowrap;width:1px}
td.td-kvp{text-align:center;padding:5px 8px;color:var(--muted);font-size:.76rem;
  white-space:nowrap;width:1px}
td.rc{width:30px;min-width:30px;max-width:30px;padding:4px 1px;text-align:center;
  font-weight:700;font-size:.85rem;position:relative;border:1px solid rgba(0,0,0,.2)}
.cw{background:var(--win-bg);color:var(--win-tx)}
.cl{background:var(--loss-bg);color:var(--loss-tx)}
.cd{background:var(--draw-bg);color:var(--draw-tx)}
.cs{background:repeating-linear-gradient(45deg,#222,#222 4px,#1A1A1A 4px,#1A1A1A 8px)}
.ce{color:#555;font-size:.75rem}
.opp{position:absolute;top:2px;font-size:.55rem;font-weight:500;opacity:.7;line-height:1}
.opp-w{right:3px}
.opp-b{left:3px}
.opp-c{left:50%;transform:translateX(-50%)}
.gen{margin-top:12px;color:var(--muted);font-size:.75rem;text-align:right}
.gen a{color:inherit;text-underline-offset:2px}
.loading{padding:40px;text-align:center;color:var(--muted);font-size:.95rem}

/* ── Mobilanpassning ── */
@media(max-width:600px){
  #view-tourn{padding:12px}
  .topbar{padding:8px 10px;gap:8px}
  .topbar h1{font-size:1rem}
  .vbtn{padding:5px 8px;font-size:.76rem}
  .card{padding:28px 20px}
}

/* ── Print ── */
@media print{
  .topbar-btns,.exportbar,.search-wrap{display:none!important}
  #view-tourn{display:block!important;padding:0}
  .topbar{background:none;border:none;padding:0 0 8px 0;margin-bottom:8px}
  .topbar h1{color:#000;font-size:14pt}
  .wrap{border:none;overflow:visible}
  body{background:#fff;color:#000}
  table{width:100%;font-size:9pt}
  thead th{background:#8B0000!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  thead{display:table-header-group}
  tr{break-inside:avoid}
  td.td-name{position:static}
  .gen{color:#555;font-size:8pt}
  .cw{background:#c8e6c9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cl{background:#ffcdd2!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cd{background:#fff9c4!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<!-- ── SÖKVY ── -->
<div id="view-search" class="search-wrap">
  <div class="card">
    <h1>♟ Turneringstabeller</h1>
    <p class="sub">Sök efter turnering eller klubb — data hämtas direkt från member.schack.se</p>
    <label class="search-label" for="q">Turnering eller klubb</label>
    <div class="search-row">
      <input type="text" id="q" placeholder="t.ex. Svarta Hästen..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">Sök</button>
    </div>
    <div id="results"></div>
  </div>
</div>

<!-- ── TURNERINGSVY ── -->
<div id="view-tourn">
  <div class="topbar">
    <h1 id="tourn-title"></h1>
    <div class="topbar-btns">
      <button class="vbtn" onclick="goBack()">← Tillbaka</button>
      <button class="vbtn" id="btn-copy" onclick="copyLink()">Kopiera länk</button>
      <button class="vbtn active" onclick="showTab('cross',this)">Korstabell</button>
      <button class="vbtn"        onclick="showTab('round',this)">Rond för rond</button>
      <button class="vbtn"        onclick="showTab('compact',this)">Komprimerad</button>
    </div>
  </div>
  <div class="exportbar">
    <button class="ebtn" onclick="exportCSV()">⬇ Ladda ner CSV</button>
    <button class="ebtn" onclick="window.print()">🖨 Skriv ut / PDF</button>
  </div>
  <div class="wrap">
    <div id="tab-cross"></div>
    <div id="tab-round"   style="display:none"></div>
    <div id="tab-compact" style="display:none"></div>
  </div>
  <div class="gen" id="tourn-footer"></div>
</div>

<script>
const BASE = 'https://member.schack.se/public/api/v1';

// ── Global state ──
let _currentPlayers  = [];
let _currentMatrix   = {};
let _currentRoundInfo= {};
let _currentNRounds  = 0;
let _currentTournType= 1;
let _currentGroupId  = null;
let _currentTab      = 'cross';
let _lastQuery       = '';

// ── Navigation ──
function show(viewId) {
  document.getElementById('view-search').style.display = viewId === 'view-search' ? 'block' : 'none';
  document.getElementById('view-tourn').style.display  = viewId === 'view-tourn'  ? 'block' : 'none';
}
function goBack() {
  history.pushState({}, '', location.pathname);
  show('view-search');
}

function showTab(name, btn) {
  ['cross','round','compact'].forEach(t =>
    document.getElementById('tab-'+t).style.display = t === name ? 'block' : 'none'
  );
  document.querySelectorAll('#view-tourn .vbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _currentTab = name;
}

// ── Kopiera länk ──
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Kopierat!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopiera länk'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Sök ──
let _results = [];

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  _lastQuery = q;
  const el = document.getElementById('results');
  el.innerHTML = '<div class="msg">Söker…</div>';
  try {
    const data = await apiFetch(`/tournament/group/search/${encodeURIComponent(q)}`);
    if (!data.length) {
      el.innerHTML = '<div class="msg">Inga turneringar hittades för den sökningen.</div>';
      return;
    }
    _results = data.sort((a,b) => b.id - a.id);
    const count = `<div class="results-count">${_results.length} turnering${_results.length !== 1 ? 'ar' : ''} hittades</div>`;
    el.innerHTML = count + _results.map((t, i) => `
      <div class="result-item" onclick="selectResult(${i})">
        <div class="result-name">${highlight(esc(t.name), q)}</div>
        <div class="result-meta">Grupp-ID: ${t.id}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="error-msg">Kunde inte nå member.schack.se. Kontrollera din internetanslutning och försök igen.</div>`;
  }
}

function highlight(escapedText, query) {
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escapedText.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function selectResult(i) {
  const t = _results[i];
  if (t) loadTournament(t.id, t.name);
}

// ── Ladda turnering ──
async function loadTournament(groupId, name) {
  history.pushState({}, '', '?id=' + groupId + '&name=' + encodeURIComponent(name));
  _currentGroupId = groupId;
  document.getElementById('tourn-title').textContent = name;
  document.getElementById('tab-cross').innerHTML = '<div class="loading">Hämtar data…</div>';
  document.getElementById('tab-round').innerHTML = '';
  document.getElementById('tab-compact').innerHTML = '';
  document.getElementById('tourn-footer').innerHTML = '';
  document.querySelectorAll('#view-tourn .vbtn').forEach((b,i) => b.classList.toggle('active', i===2));
  ['cross','round','compact'].forEach((t,i) =>
    document.getElementById('tab-'+t).style.display = i===0 ? 'block' : 'none'
  );
  _currentTab = 'cross';
  show('view-tourn');

  try {
    const [tableData, roundData, groupInfo] = await Promise.all([
      apiFetch(`/tournamentresults/table/id/${groupId}`),
      apiFetch(`/tournamentresults/roundresults/id/${groupId}`),
      apiFetch(`/tournament/group/id/${groupId}`)
    ]);

    // Turneringstyp: 1=klassiskt, 2=snabb, 3=blixt
    _currentTournType = groupInfo?.type ?? 1;

    const players = processStandings(tableData, _currentTournType);

    if (!players.length) {
      document.getElementById('tab-cross').innerHTML =
        '<p style="color:var(--muted);padding:24px;text-align:center">Inga resultat har registrerats för den här turneringen än.</p>';
      show('view-tourn');
      return;
    }

    const { roundInfo, matrix } = processRounds(players, roundData);
    const nRounds = players.length
      ? Math.max(0, ...Object.values(roundInfo).flatMap(r => Object.keys(r).map(Number)))
      : 0;

    const byId = {};
    players.forEach(p => byId[p.id] = p);
    players.forEach(p => { p.pr = calcPR(p, byId, roundInfo); });

    _currentPlayers   = players;
    _currentMatrix    = matrix;
    _currentRoundInfo = roundInfo;
    _currentNRounds   = nRounds;

    document.getElementById('tab-cross').innerHTML   = buildCrossTable(players, matrix);
    document.getElementById('tab-round').innerHTML   = nRounds
      ? buildRoundTable(players, roundInfo, nRounds)
      : '<p style="color:var(--muted);padding:16px">Rundinformation saknas för den här turneringen.</p>';
    document.getElementById('tab-compact').innerHTML = buildStandings(players);

    const now = new Date().toLocaleString('sv-SE',{
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'
    }).replace(',','');
    document.getElementById('tourn-footer').innerHTML =
      `Genererad ${now} · Källa: <a href="https://member.schack.se/ShowTournamentServlet?id=${groupId}&listingtype=1" target="_blank">member.schack.se</a> · grupp-ID ${groupId}`;

  } catch(e) {
    document.getElementById('tab-cross').innerHTML =
      `<div class="error-msg" style="margin:16px">Kunde inte hämta data för den här turneringen. Kontrollera att grupp-ID:t är korrekt och försök igen.</div>`;
  }
}

// ── CSV-export ──
function ratingLabel(tournType) {
  if (tournType === 3) return 'Blixt';
  if (tournType === 2) return 'Snabb';
  return 'Rating';
}

function csvCell(v) {
  const s = String(v ?? '');
  const safe = /^[=+\-@]/.test(s) ? "'" + s : s;
  return '"' + safe.replace(/"/g, '""') + '"';
}

function exportCSV() {
  if (!_currentPlayers.length) return;
  const rLbl = ratingLabel(_currentTournType);
  let rows = [];

  if (_currentTab === 'compact') {
    rows.push(['#','Namn','Klubb',rLbl,'Spelat','Vinster','Remier','Förluster','Poäng','KV.P','PR'].map(csvCell).join(','));
    _currentPlayers.forEach(p => {
      rows.push([p.rank,p.name,p.club,p.rating||'',p.sp,p.wins,p.draws,p.losses,
        fmtScore(p.score),p.kvp,p.pr!==''?p.pr:''].map(csvCell).join(','));
    });
  } else if (_currentTab === 'round') {
    const rHdr = Array.from({length:_currentNRounds},(_,i)=>`Rond ${i+1}`);
    rows.push(['#','Namn','Klubb',rLbl,...rHdr,'Poäng','KV.P','PR'].map(csvCell).join(','));
    _currentPlayers.forEach(p => {
      const rnds = Array.from({length:_currentNRounds},(_,i) => {
        const info = _currentRoundInfo[p.id]?.[i+1];
        if (!info) return '';
        return (info.score===1?'1':info.score===0?'0':'½') + ' (mot ' + info.opp_rank + ')';
      });
      rows.push([p.rank,p.name,p.club,p.rating||'',...rnds,
        fmtScore(p.score),p.kvp,p.pr!==''?p.pr:''].map(csvCell).join(','));
    });
  } else {
    // Korstabell
    const hdr = _currentPlayers.map((_,j)=>j+1);
    rows.push(['#','Namn','Klubb',rLbl,...hdr,'Poäng','KV.P','PR'].map(csvCell).join(','));
    _currentPlayers.forEach((p,i) => {
      let pts = 0;
      const cells = _currentPlayers.map((opp,j) => {
        if (i===j) return 'X';
        const v = _currentMatrix[p.id]?.[opp.id];
        if (v==='win')  { pts+=1;   return '1'; }
        if (v==='draw') { pts+=0.5; return '½'; }
        if (v==='loss') return '0';
        return '';
      });
      rows.push([p.rank,p.name,p.club,p.rating||'',...cells,
        fmtScore(pts),p.kvp,p.pr!==''?p.pr:''].map(csvCell).join(','));
    });
  }

  const bom = '﻿';
  const blob = new Blob([bom + rows.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (document.getElementById('tourn-title').textContent || 'turnering')
    .replace(/[^a-zA-Z0-9åäöÅÄÖ _-]/g,'').trim() + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Databearbetning ──
function getRating(elo, tournType) {
  if (!elo) return 0;
  if (tournType === 3) return elo.blitzRating || 0;
  if (tournType === 2) return elo.rapidRating || 0;
  return elo.rating || 0;
}

function processStandings(data, tournType) {
  return data
    .sort((a,b) => (a.place||999) - (b.place||999))
    .map(p => {
      const pi = p.playerInfo || {};
      const sp = (p.wonGames||0) + (p.drawGames||0) + (p.lostGames||0);
      const kvpRaw = p.secPoints;
      const kvp = kvpRaw != null ? fmtScore(Math.round(kvpRaw * 2) / 2) : '';
      return {
        id:     p.contenderId,
        name:   [pi.firstName, pi.lastName].filter(Boolean).join(' ') || `Spelare ${p.contenderId}`,
        club:   pi.club || '',
        rating: getRating(pi.elo, tournType),
        rank:   p.place || 0,
        score:  p.points || 0,
        kvp,
        wins:   String(p.wonGames  || 0),
        draws:  String(p.drawGames || 0),
        losses: String(p.lostGames || 0),
        sp:     String(sp),
      };
    });
}

function parseResult(val) {
  if (val === 1   || val === 1.0) return {w:1,   b:0  };
  if (val === 0   || val === 0.0) return {w:0,   b:1  };
  if (val === 0.5)                return {w:0.5, b:0.5};
  if (val === 2)                  return {w:0.5, b:0.5};
  if (val === 3)                  return {w:0,   b:1  };
  if (typeof val === 'string') {
    const s = val.toLowerCase().replace('½','0.5').replace(',','.');
    if (s.includes('1-0') || s==='1') return {w:1,   b:0  };
    if (s.includes('0-1') || s==='0') return {w:0,   b:1  };
    return {w:0.5, b:0.5};
  }
  return null;
}

function processRounds(players, roundResults) {
  const byId = {};
  players.forEach(p => byId[p.id] = p);
  const roundInfo = {};
  const matrix    = {};
  players.forEach(p => { roundInfo[p.id] = {}; matrix[p.id] = {}; });

  for (const rr of roundResults) {
    const rn = rr.roundNr;
    const pairings = [];

    if (rr.games?.length) {
      for (const g of rr.games) {
        if (!g.whiteId || !g.blackId) continue;
        if (g.result == null || g.result === 0) continue;
        const res = parseResult(g.result);
        if (res) pairings.push({wId:g.whiteId, bId:g.blackId, res});
      }
    }
    if (!pairings.length && rr.homeId && rr.awayId) {
      const hr = rr.homeResult ?? 0, ar = rr.awayResult ?? 0;
      if (hr === 0 && ar === 0) continue;
      let w, b;
      if (hr === ar)   { w = 0.5; b = 0.5; }
      else if (hr > ar){ w = 1;   b = 0;   }
      else             { w = 0;   b = 1;   }
      pairings.push({wId: rr.homeId, bId: rr.awayId, res: {w, b}});
    }

    for (const {wId, bId, res} of pairings) {
      const wp = byId[wId], bp = byId[bId];
      if (!wp || !bp) continue;
      if (!roundInfo[wId]) roundInfo[wId] = {};
      if (!roundInfo[bId]) roundInfo[bId] = {};
      roundInfo[wId][rn] = {opp_id:bId, score:res.w, color:'w', opp_rank:bp.rank};
      roundInfo[bId][rn] = {opp_id:wId, score:res.b, color:'b', opp_rank:wp.rank};
      if (!matrix[wId]) matrix[wId] = {};
      if (!matrix[bId]) matrix[bId] = {};
      matrix[wId][bId] = res.w===1?'win':res.w===0?'loss':'draw';
      matrix[bId][wId] = res.b===1?'win':res.b===0?'loss':'draw';
    }
  }
  return {roundInfo, matrix};
}

function lookupD(p) {
  let best = FIDE_D[0];
  for (const row of FIDE_D) {
    if (Math.abs(row[0] - p) < Math.abs(best[0] - p)) best = row;
  }
  return best[1];
}

function calcPR(player, byId, roundInfo) {
  const rounds = roundInfo[player.id] || {};
  let totalRating = 0, totalScore = 0, count = 0;
  for (const rn of Object.values(rounds)) {
    const opp = byId[rn.opp_id];
    if (!opp || !opp.rating) continue;
    totalRating += opp.rating;
    totalScore += rn.score;
    count++;
  }
  if (count === 0) return '';
  const avgRating = totalRating / count;
  const p = totalScore / count;
  return Math.round(avgRating + lookupD(p));
}

// ── HTML-generering ──
function fmtScore(s) {
  const w = Math.floor(s), half = Math.abs(s - w - 0.5) < 0.01;
  return (w===0 && half) ? '½' : String(w) + (half ? '½' : '');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function playerCells(p) {
  const rLbl = ratingLabel(_currentTournType);
  const sub = [p.club, p.rating ? `${rLbl} ${p.rating}` : ''].filter(Boolean).join(' · ');
  return `<td class="td-rank">${p.rank}</td><td class="td-name"><span class="td-pname">${esc(p.name)}</span>${sub?`<span class="td-sub">${esc(sub)}</span>`:''}</td>`;
}
const PR_TOOLTIP = 'Prestationsrating – beräknad enligt FIDE:s formel baserat på resultat mot ratade motståndare';

function buildCrossTable(players, matrix) {
  let h = '<table><thead><tr><th class="th-name" colspan="2">Spelare</th>';
  players.forEach((_,j) => h += `<th class="th-num" title="${esc(players[j].name)}">${j+1}</th>`);
  h += `<th class="th-stat">Poäng</th><th class="th-stat">KV.P</th><th class="th-pr" title="${PR_TOOLTIP}">PR ℹ</th></tr></thead><tbody>`;
  players.forEach((p,i) => {
    h += '<tr>' + playerCells(p);
    let computed = 0;
    players.forEach((opp,j) => {
      if (i===j) { h += '<td class="rc cs"></td>'; return; }
      const v = matrix[p.id]?.[opp.id];
      const cls = {win:'cw',loss:'cl',draw:'cd'}[v]||'ce';
      const lbl = {win:'1',loss:'0',draw:'½'}[v]||'–';
      h += `<td class="rc ${cls}" title="${esc(p.name)} vs ${esc(opp.name)}">${lbl}</td>`;
      computed += v==='win'?1:v==='draw'?0.5:0;
    });
    h += `<td class="td-score">${fmtScore(computed)}</td><td class="td-kvp">${esc(p.kvp)}</td><td class="td-kvp">${p.pr !== '' ? p.pr : '–'}</td></tr>`;
  });
  return h + '</tbody></table>';
}

function buildRoundTable(players, roundInfo, nRounds) {
  let h = '<table><thead><tr><th class="th-name" colspan="2">Spelare</th>';
  for (let r=1;r<=nRounds;r++) h += `<th class="th-cell">${r}</th>`;
  h += `<th class="th-stat">Poäng</th><th class="th-stat">KV.P</th><th class="th-pr" title="${PR_TOOLTIP}">PR ℹ</th></tr></thead><tbody>`;
  players.forEach(p => {
    h += '<tr>' + playerCells(p);
    for (let rn=1;rn<=nRounds;rn++) {
      const info = roundInfo[p.id]?.[rn];
      if (!info) { h += '<td class="rc ce">–</td>'; continue; }
      const cls = info.score===1?'cw':info.score===0?'cl':'cd';
      const lbl = info.score===1?'1':info.score===0?'0':'½';
      const cornerCls = info.color==='w'?'opp-w':info.color==='b'?'opp-b':'opp-c';
      h += `<td class="rc ${cls}" title="mot ${info.opp_rank} (${info.color==='w'?'vit':'svart'}): ${lbl}"><span class="opp ${cornerCls}">${info.opp_rank}</span>${lbl}</td>`;
    }
    h += `<td class="td-score">${fmtScore(p.score)}</td><td class="td-kvp">${esc(p.kvp)}</td><td class="td-kvp">${p.pr !== '' ? p.pr : '–'}</td></tr>`;
  });
  return h + '</tbody></table>';
}

function buildStandings(players) {
  let h = '<table><thead><tr><th class="th-name" colspan="2">Spelare</th>';
  h += `<th class="th-stat">Spelat</th><th class="th-stat">Vinster</th><th class="th-stat">Remier</th><th class="th-stat">Förluster</th><th class="th-stat">Poäng</th><th class="th-stat">KV.P</th><th class="th-pr" title="${PR_TOOLTIP}">PR ℹ</th></tr></thead><tbody>`;
  players.forEach(p => {
    h += '<tr>' + playerCells(p);
    h += `<td class="td-cell">${esc(p.sp)}</td>`;
    h += `<td class="td-cell td-w">${esc(p.wins)}</td>`;
    h += `<td class="td-cell td-d">${esc(p.draws)}</td>`;
    h += `<td class="td-cell td-l">${esc(p.losses)}</td>`;
    h += `<td class="td-score">${fmtScore(p.score)}</td>`;
    h += `<td class="td-kvp">${esc(p.kvp)}</td>`;
    h += `<td class="td-kvp">${p.pr !== '' ? p.pr : '–'}</td></tr>`;
  });
  return h + '</tbody></table>';
}

  const r = await fetch(BASE + path);

}
